<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>らくがき2by8 サポート</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f5;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #4b5563;
      --accent: #2563eb;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(100%, 680px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 24px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(1.75rem, 5vw, 2.25rem);
      line-height: 1.3;
    }

    p {
      margin: 0 0 16px;
      font-size: 1rem;
    }

    .contact {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    a {
      color: var(--accent);
      word-break: break-all;
    }

    @media (max-width: 480px) {
      .card {
        padding: 24px 18px;
        border-radius: 12px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>らくがき2by8 サポート</h1>
      <p>アプリ名: らくがき2by8</p>
      <p>らくがき2by8 をご利用いただきありがとうございます。</p>
      <p>不具合報告・ご意見・ご要望はこちらまでご連絡ください。</p>
      <div class="contact">
        <p>連絡先: <a href="mailto:sekinekengo+support@gmail.com">sekinekengo+support@gmail.com</a></p>
      </div>
    </section>
  </main>
</body>
</html>
